<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
    <title>UM-982 Settings</title>
</head>
<body>
    <h1>UM-982 Settings</h1>
    
    <div class="status-container">
        <form id="settings-form">
            <div class="status-field">
                <label for="tcp-port">TCP Port:</label>
                <input type="text" id="tcp-port" name="tcp-port" required
                       class="command-input" style="margin-right: 0;">
            </div>
            
            <div class="status-field">
                <label for="n2k-heading">Transmit NMEA 2000 Heading:</label>
                <label class="switch">
                    <input type="checkbox" id="n2k-heading" name="n2k-heading">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="button-group" style="margin-top: 20px;">
                <button type="submit" class="resume-btn">Save Settings</button>
                <button type="button" class="freeze-btn" onclick="window.location.href='/'">Cancel</button>
            </div>
        </form>
    </div>
    
    <div id="status-message" style="text-align: center; margin: 1em 0; display: none;"></div>
    
    <script>
        // Fetch current settings when page loads
        window.addEventListener('load', function() {
            fetch('/settings')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('tcp-port').value = data.port;
                    document.getElementById('n2k-heading').checked = data.n2kSend;
                })
                .catch(error => {
                    console.error('Error fetching settings:', error);
                    showMessage('Error loading settings. Please try again.', 'error');
                });
        });
        
        // Handle form submission
        document.getElementById('settings-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const port = document.getElementById('tcp-port').value;
            const n2kSend = document.getElementById('n2k-heading').checked;
            
            fetch('/settings', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    port: parseInt(port),
                    n2kSend: n2kSend
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                showMessage('Settings saved successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            })
            .catch(error => {
                console.error('Error saving settings:', error);
                showMessage('Error saving settings. Please try again.', 'error');
            });
        });
        
        // Helper function to show status messages
        function showMessage(message, type) {
            const statusElement = document.getElementById('status-message');
            statusElement.textContent = message;
            statusElement.style.display = 'block';
            
            if (type === 'success') {
                statusElement.style.color = '#4CAF50';
            } else {
                statusElement.style.color = '#f44336';
            }
            
            // Hide message after 5 seconds
            setTimeout(() => {
                statusElement.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
