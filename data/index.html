<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
    <!-- OpenLayers CSS and JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="nmea-container">
        <div class="nmea-line">Waiting for data...</div>
    </div>
    
    <div id="chart-container" class="chart-container">
        <div class="chart-header">
            <button id="toggle-chart-btn" class="toggle-chart-btn" onclick="toggleChart()">Hide Chart</button>
            <button id="clear-chart-btn" class="clear-chart-btn" onclick="clearChartData()">Clear Data</button>
        </div>
        <canvas id="headingQualityChart" width="400" height="200"></canvas>
    </div>
    
    <!-- Position Drift Map Container -->
    <div class="chart-container map-chart">
        <div class="chart-header">
            <h3>Position Drift</h3>
            <div class="map-controls">
                <button class="map-button" onclick="window.osmMap.zoomIn()">+</button>
                <button class="map-button" onclick="window.osmMap.zoomOut()">-</button>
            </div>
        </div>
        <div id="position-drift-map" class="map-container"></div>
    </div>
    
    <div class="status-container">
        <div class="status-field">
            <label>Heading:</label>
            <span id="heading-value">-</span>
        </div>
        <div class="status-field">
            <label>Quality:</label>
            <span id="sol-stat">-</span>
        </div>
        <div class="status-field">
            <label>Satellites:</label>
            <span id="pos-type">-</span>
        </div>
        <div class="status-field">
            <label>UTC:</label>
            <span id="utc-value">-</span>
        </div>
        <div class="status-field">
            <label>Primary Antenna Status:</label>
            <span id="primary-antenna-status">-</span>
        </div>
        <div class="status-field">
            <label>Secondary Antenna Status:</label>
            <span id="secondary-antenna-status">-</span>
        </div>
        <div class="status-field">
            <label>Baseline:</label>
            <span id="baseline-value">-</span>
        </div>
        <div class="status-field">
            <label>Lat:</label>
            <span id="latitude-value">-</span>
        </div>
        <div class="status-field">
            <label>Lon:</label>
            <span id="longitude-value">-</span>
        </div>
        <div class="status-field">
            <label>Pitch:</label>
            <span id="pitch-value">-</span>°
        </div>
        <div class="status-field">
            <label>Roll:</label>
            <span id="roll-value">-</span>°
        </div>
    </div>
    <div class="controls-container">
        <div class="button-group">
            <button id="freeze-btn" class="freeze-btn" onclick="freezeData()">Freeze</button>
            <button id="resume-btn" class="resume-btn" onclick="resumeData()" disabled>Resume</button>
            <button id="settings-btn" class="settings-btn" onclick="window.location.href='/settings.html'">Settings</button>
        </div>
        <label for="command-input" class="command-label">Send Command to RTK sensor:</label>
        <input type="text" id="command-input" class="command-input" placeholder="Enter command...">
        <button class="send-btn" onclick="sendCommand()">Send</button>
    </div>
    <script src="/sse.js"></script>
    <script src="/chart.js"></script>
    <script src="/osm.js"></script>
    <script>
        // Initialize the Position Drift map when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (window.osmMap) {
                window.osmMap.init();
            }
        });
    </script>
</body>
</html>
